---
- name: Run Debian dist-upgrade
  ansible.builtin.apt:
    upgrade: dist
  environment:
    DEBIAN_FRONTEND: "{{ uip_debian_debconf_frontend }}"
    APT_LISTCHANGES_FRONTEND: "{{ uip_debian_apt_listchanges_frontend }}"
  when:
    - uip_mode == "enforce"
  tags:
    - uip_upgrade
    - uip_postupgrade
