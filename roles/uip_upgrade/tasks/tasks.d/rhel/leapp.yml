---
- name: Run Leapp upgrade
  ansible.builtin.command: >-
    leapp upgrade
    {{ '--target ' ~ uip_rhel_leapp_target_release if uip_rhel_leapp_target_release | length > 0 else '' }}
  register: uip_leapp_upgrade
  changed_when: true
  failed_when: uip_leapp_upgrade.rc != 0
  when: uip_mode == "enforce"
  tags:
    - uip_upgrade
    - uip_postupgrade

- name: Save Leapp upgrade output
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/leapp-upgrade.txt"
    owner: root
    group: root
    mode: "0640"
    content: |
      stdout:
      {{ uip_leapp_upgrade.stdout | default('') }}
      stderr:
      {{ uip_leapp_upgrade.stderr | default('') }}
  when: uip_mode == "enforce"
  tags:
    - uip_upgrade
    - uip_postupgrade
