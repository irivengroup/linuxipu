---
- name: Assert VMware managed object reference is provided
  ansible.builtin.assert:
    that:
      - uip_vmware_vm_moid is defined
    fail_msg: "VMware snapshot requires uip_vmware_vm_moid."
  tags:
    - uip_snapshot
    - uip_preupgrade

- name: Authenticate to VMware vCenter REST API
  ansible.builtin.uri:
    url: "{{ uip_vmprovider_creds.vcenter_url }}/rest/com/vmware/cis/session"
    method: POST
    user: "{{ uip_vmprovider_creds.username }}"
    password: "{{ uip_vmprovider_creds.password }}"
    force_basic_auth: true
    validate_certs: "{{ uip_vmprovider_creds.validate_certs | bool }}"
    status_code: 200
    timeout: "{{ uip_snapshot_api_timeout }}"
  register: uip_vmware_session
  no_log: true
  tags:
    - uip_snapshot
    - uip_preupgrade

- name: Create VMware VM snapshot
  ansible.builtin.uri:
    url: "{{ uip_vmprovider_creds.vcenter_url }}/rest/vcenter/vm/{{ uip_vmware_vm_moid }}/snapshots"
    method: POST
    validate_certs: "{{ uip_vmprovider_creds.validate_certs | bool }}"
    headers:
      vmware-api-session-id: "{{ uip_vmware_session.json.value }}"
    body_format: json
    status_code:
      - 200
      - 201
    body:
      spec:
        name: "{{ uip_snapshot_id }}"
        description: "UIP snapshot before {{ uip_os }} {{ uip_src_ver }} to {{ uip_dst_ver }}"
        memory: false
        quiesce: true
    timeout: "{{ uip_snapshot_api_timeout }}"
  register: uip_vmware_snapshot
  no_log: true
  tags:
    - uip_snapshot
    - uip_preupgrade

- name: Set VMware snapshot reference
  ansible.builtin.set_fact:
    uip_provider_snapshot_ref: "{{ uip_vmware_snapshot.json.value | default(uip_snapshot_id) }}"
  tags:
    - uip_snapshot
    - uip_preupgrade

- name: Persist VMware snapshot provider scope report
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/snapshot-vmware.yml"
    owner: root
    group: root
    mode: "0640"
    content: |
      provider: "vmware"
      provider_scope: "{{ uip_vmprovider_scope }}"
      snapshot_id: "{{ uip_snapshot_id }}"
      provider_snapshot_ref: "{{ uip_provider_snapshot_ref }}"
  tags:
    - uip_snapshot
    - uip_preupgrade
