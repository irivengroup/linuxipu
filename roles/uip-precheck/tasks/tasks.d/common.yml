---
- name: Check root free space
  ansible.builtin.assert:
    that:
      - (ansible_mounts | selectattr('mount', 'equalto', '/') | first).size_available // 1024 // 1024 >= uip_pre_min_root_mb
    fail_msg: "Not enough free space on /"
  tags:
    - uip_precheck_sys

- name: Check default route
  ansible.builtin.command: ip route show default
  register: uip_route
  changed_when: false
  failed_when: uip_route.rc != 0
  tags:
    - uip_precheck_sys

- name: Check DNS resolution
  ansible.builtin.command: getent hosts example.com
  register: uip_dns
  changed_when: false
  failed_when: uip_dns.rc != 0
  tags:
    - uip_precheck_sys

- name: Check failed systemd units
  ansible.builtin.command: systemctl --failed --no-legend
  register: uip_failed_units
  changed_when: false
  failed_when: false
  tags:
    - uip_precheck_sys
