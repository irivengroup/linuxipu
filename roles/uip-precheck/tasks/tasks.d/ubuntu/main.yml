---
- name: Ubuntu | Ensure required packages are present
  ansible.builtin.apt:
    name:
      - update-manager-core
      - ubuntu-release-upgrader-core
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
    update_cache: true
  tags: [uip_precheck, uip_precheck_ubuntu, uip_precheck_sys]

- name: Ubuntu | Check dpkg audit
  ansible.builtin.command: dpkg --audit
  register: uip_dpkg_audit
  changed_when: false
  failed_when: uip_pre_block_if_broken_pkgs | bool and (uip_dpkg_audit.stdout | trim | length > 0)
  tags: [uip_precheck, uip_precheck_ubuntu, uip_precheck_sys]

- name: Ubuntu | Check held packages
  ansible.builtin.command: apt-mark showhold
  register: uip_apt_holds
  changed_when: false
  failed_when: uip_pre_block_if_held_pkgs | bool and (uip_apt_holds.stdout | trim | length > 0)
  tags: [uip_precheck, uip_precheck_ubuntu, uip_precheck_sys]

- name: Ubuntu | Check apt repositories are reachable
  ansible.builtin.apt:
    update_cache: true
  tags: [uip_precheck, uip_precheck_ubuntu, uip_precheck_sys]

- name: Ubuntu | Assert LTS upgrader prompt
  ansible.builtin.lineinfile:
    path: /etc/update-manager/release-upgrades
    regexp: '^Prompt='
    line: 'Prompt=lts'
    create: true
    mode: '0644'
  check_mode: true
  register: uip_prompt_check
  changed_when: false
  tags: [uip_precheck, uip_precheck_ubuntu, uip_precheck_sys]

- name: Ubuntu | Run release upgrade check
  ansible.builtin.command: do-release-upgrade -c
  register: uip_precheck_out
  changed_when: false
  failed_when: false
  tags: [uip_precheck, uip_precheck_ubuntu]
