---
- name: Gather service facts for agent detection
  ansible.builtin.service_facts: null
  tags:
  - uip_precheck
  - uip_precheck_agents
  - uip_preupgrade
- name: Build active disruptive agent list
  ansible.builtin.set_fact:
    uip_active_agents: "{{\n  ansible_facts.services\n  | dict2items\n  | selectattr('key', 'in', uip_agent_services)\n  |\
      \ selectattr('value.state', 'equalto', 'running')\n  | map(attribute='key')\n  | list\n}}"
  tags:
  - uip_precheck
  - uip_precheck_agents
  - uip_preupgrade
- name: Build active patch automation list
  ansible.builtin.set_fact:
    uip_active_patch_automation: "{{\n  ansible_facts.services\n  | dict2items\n  | selectattr('key', 'in', uip_patch_automation_services)\n\
      \  | selectattr('value.state', 'equalto', 'running')\n  | map(attribute='key')\n  | list\n}}"
  tags:
  - uip_precheck
  - uip_precheck_agents
  - uip_preupgrade
- name: Persist disruptive agents report
  ansible.builtin.copy:
    dest: '{{ uip_report_dir }}/precheck-agents.yml'
    owner: root
    group: root
    mode: '0640'
    content: 'active_agents:

      {{ uip_active_agents | default([]) | to_nice_yaml(indent=2) | indent(2, true) }}

      active_patch_automation:

      {{ uip_active_patch_automation | default([]) | to_nice_yaml(indent=2) | indent(2, true) }}

      '
  tags:
  - uip_precheck
  - uip_precheck_agents
  - uip_preupgrade
