---
- name: Check rpm database
  ansible.builtin.command: rpm --verifydb
  changed_when: false
  tags:
    - uip_precheck_rhel

- name: Run RHEL vendor precheck
  ansible.builtin.command: "{{ uip_pre_tool }}"
  register: uip_vendor_precheck
  changed_when: false
  failed_when: false
  tags:
    - uip_precheck_rhel
