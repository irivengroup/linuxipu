---
- name: Detect UEFI boot mode
  ansible.builtin.stat:
    path: /sys/firmware/efi
  register: uip_efi_mode
  tags:
    - uip_precheck
    - uip_precheck_sys
    - uip_preupgrade
- name: Define critical filesystem requirements
  ansible.builtin.set_fact:
    uip_pre_fs_req:
      - name: root
        path: /
        min_mb: "{{ uip_pre_min_root_mb }}"
      - name: boot
        path: /boot
        min_mb: "{{ uip_pre_min_boot_mb }}"
      - name: var
        path: /var
        min_mb: "{{ uip_pre_min_var_mb }}"
      - name: tmp
        path: /tmp
        min_mb: "{{ uip_pre_min_tmp_mb }}"
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Build critical filesystem verification report
  ansible.builtin.set_fact:
    uip_pre_fs_report: "{{ uip_pre_fs_report | default([]) + [uip_pre_fs_item] }}"
  vars:
    uip_pre_fs_mount: >-
      {{
        (
          ansible_mounts
          | selectattr('mount', 'equalto', item.path)
          | list
          | first
        ) | default({})
      }}
    uip_pre_fs_free_mb: "{{ (uip_pre_fs_mount.size_available | default(0) | int) // 1024 // 1024 }}"
    uip_pre_fs_item:
      name: "{{ item.name }}"
      path: "{{ item.path }}"
      free_mb: "{{ uip_pre_fs_free_mb | int }}"
      status: "{{ 'ok' if (uip_pre_fs_free_mb | int) >= (item.min_mb | int) else 'ko' }}"
      min_required_mb: "{{ item.min_mb | int }}"
      mount: "{{ uip_pre_fs_mount.mount | default(item.path) }}"
      fstype: "{{ uip_pre_fs_mount.fstype | default('unknown') }}"
  loop: "{{ uip_pre_fs_req }}"
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Display critical filesystem verification report
  ansible.builtin.debug:
    var: uip_pre_fs_report
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Persist critical filesystem verification report
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/precheck-filesystems.yml"
    owner: root
    group: root
    mode: "0640"
    content: "{{ uip_pre_fs_report | to_nice_yaml }}"
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Append /boot/efi critical filesystem report when system is UEFI
  ansible.builtin.set_fact:
    uip_fs_report: "{{ uip_fs_report + [uip_boot_efi_item] }}"
  vars:
    uip_boot_efi_mount: >-
      {{
        (
          ansible_mounts
          | selectattr('mount', 'equalto', '/boot/efi')
          | list
          | first
        ) | default({})
      }}
    uip_boot_efi_free_mb: "{{ (uip_boot_efi_mount.size_available | default(0) | int) // 1024 // 1024 }}"
    uip_boot_efi_item:
      name: "boot_efi"
      path: "/boot/efi"
      free_mb: "{{ uip_boot_efi_free_mb | int }}"
      status: "{{ 'ok' if (uip_boot_efi_free_mb | int) >= (uip_pre_min_boot_efi_mb | int) else 'ko' }}"
      min_required_mb: "{{ uip_pre_min_boot_efi_mb | int }}"
      mount: "{{ uip_boot_efi_mount.mount | default('/boot/efi') }}"
      fstype: "{{ uip_boot_efi_mount.fstype | default('unknown') }}"
  when:
    - uip_efi_mode.stat.exists
  tags:
    - uip_precheck
    - uip_precheck_sys
    - uip_preupgrade
