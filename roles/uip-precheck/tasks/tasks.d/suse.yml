---
- name: Check zypper locks
  ansible.builtin.command: zypper locks
  register: uip_zypper_locks
  changed_when: false
  failed_when: false
  tags:
    - uip_precheck_suse

- name: Run SUSE migration dry-run
  ansible.builtin.command: "{{ uip_pre_tool }}"
  register: uip_vendor_precheck
  changed_when: false
  failed_when: false
  tags:
    - uip_precheck_suse
