---
- name: Detect SUSE GRUB command
  ansible.builtin.command: command -v grub2-mkconfig
  register: uip_suse_grub2_cmd
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_grub
    - uip_preupgrade

- name: Reconfigure SUSE GRUB2
  ansible.builtin.command: "{{ uip_suse_grub2_cmd.stdout }} -o /boot/grub2/grub.cfg"
  register: uip_suse_grub_reconfigure
  changed_when: true
  failed_when: uip_suse_grub_reconfigure.rc != 0
  when: uip_suse_grub2_cmd.rc == 0
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_grub
    - uip_preupgrade

- name: Validate generated SUSE GRUB configuration exists
  ansible.builtin.stat:
    path: /boot/grub2/grub.cfg
  register: uip_suse_grub_cfg_stat
  when: uip_bootloader_validate_config | bool
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_grub
    - uip_preupgrade

- name: Assert generated SUSE GRUB configuration is usable
  ansible.builtin.assert:
    that:
      - uip_suse_grub_cfg_stat.stat.exists
      - uip_suse_grub_cfg_stat.stat.size | int > 0
    fail_msg: "SUSE GRUB configuration /boot/grub2/grub.cfg is missing or empty after regeneration."
  when: uip_bootloader_validate_config | bool
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_grub
    - uip_preupgrade

- name: Validate SUSE GRUB has at least one kernel menu entry
  ansible.builtin.command: grep -E 'menuentry|linux ' /boot/grub2/grub.cfg
  register: uip_suse_grub_menu_check
  changed_when: false
  failed_when: uip_suse_grub_menu_check.rc != 0
  when: uip_bootloader_validate_config | bool
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_grub
    - uip_preupgrade
