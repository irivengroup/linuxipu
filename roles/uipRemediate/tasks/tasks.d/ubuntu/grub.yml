---
- name: Detect Ubuntu GRUB command
  ansible.builtin.command: command -v update-grub
  register: uip_update_grub_cmd
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_grub
    - uip_preupgrade

- name: Reconfigure Ubuntu GRUB
  ansible.builtin.command: update-grub
  register: uip_ubuntu_update_grub
  changed_when: true
  failed_when: uip_ubuntu_update_grub.rc != 0
  when: uip_update_grub_cmd.rc == 0
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_grub
    - uip_preupgrade

- name: Validate generated Ubuntu GRUB configuration exists
  ansible.builtin.stat:
    path: /boot/grub/grub.cfg
  register: uip_ubuntu_grub_cfg_stat
  when: uip_bootloader_validate_config | bool
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_grub
    - uip_preupgrade

- name: Assert generated Ubuntu GRUB configuration is usable
  ansible.builtin.assert:
    that:
      - uip_ubuntu_grub_cfg_stat.stat.exists
      - uip_ubuntu_grub_cfg_stat.stat.size | int > 0
    fail_msg: "Ubuntu GRUB configuration /boot/grub/grub.cfg is missing or empty after regeneration."
  when: uip_bootloader_validate_config | bool
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_grub
    - uip_preupgrade

- name: Validate Ubuntu GRUB has at least one kernel menu entry
  ansible.builtin.command: grep -E 'menuentry|linux ' /boot/grub/grub.cfg
  register: uip_ubuntu_grub_menu_check
  changed_when: false
  failed_when: uip_ubuntu_grub_menu_check.rc != 0
  when: uip_bootloader_validate_config | bool
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_grub
    - uip_preupgrade
