---
- name: Capture future default route candidate
  ansible.builtin.command: ip route get 1.1.1.1
  register: uip_network_route_probe
  changed_when: false
  failed_when: false
  when: uip_network_validate_future_routes | bool
  tags:
    - uip_upgrade
    - uip_postupgrade

- name: Capture resolver configuration before reboot
  ansible.builtin.command: cat /etc/resolv.conf
  register: uip_network_resolver_probe
  changed_when: false
  failed_when: false
  when: uip_network_validate_future_dns | bool
  tags:
    - uip_upgrade
    - uip_postupgrade

- name: Capture bond vlan and bridge topology
  ansible.builtin.shell: |
    set -o pipefail
    echo "### links"
    ip -d link show || true
    echo "### bonds"
    cat /proc/net/bonding/* 2>/dev/null || true
    echo "### bridges"
    bridge link 2>/dev/null || true
  args:
    executable: /bin/bash
  register: uip_network_topology_probe
  changed_when: false
  failed_when: false
  when: uip_network_validate_bond_vlan_bridge | bool
  tags:
    - uip_upgrade
    - uip_postupgrade

- name: Persist future network validation report
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/network-future-validation.yml"
    owner: root
    group: root
    mode: "0640"
    content: |
      route_probe: |
      {{ uip_network_route_probe.stdout | default('') | indent(2, true) }}
      resolver: |
      {{ uip_network_resolver_probe.stdout | default('') | indent(2, true) }}
      topology: |
      {{ uip_network_topology_probe.stdout | default('') | indent(2, true) }}
  tags:
    - uip_upgrade
    - uip_postupgrade
