---
- name: Include common postcheck tasks
  ansible.builtin.import_tasks: tasks.d/common.yml
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade
- name: Re-enforce target repositories after upgrade
  ansible.builtin.include_role:
    name: uip-repos
    apply:
      tags:
        - uip_postcheck
        - uip_repos_enforce_target
        - uip_postupgrade
        - uip_discovery
        - uip_preupgrade
  vars:
    uip_repo_enforce_target: true
  tags:
    - uip_postcheck
    - uip_repos_enforce_target
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade
- name: Run health commands
  ansible.builtin.command: '{{ item }}'
  loop: '{{ uip_health_cmds }}'
  register: uip_health
  changed_when: false
  failed_when: false
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade
- name: Restore original fstab after successful upgrade
  ansible.builtin.copy:
    src: "{{ uip_remediate_fstab_backup }}"
    dest: /etc/fstab
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  when:
    - uip_remediate_fstab_backup is defined
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade

- name: Validate restored fstab
  ansible.builtin.command: findmnt --verify --tab-file /etc/fstab
  register: uip_post_fstab_verify
  changed_when: false
  failed_when: uip_post_fstab_verify.rc != 0
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade

- name: Restart previously stopped agents after upgrade
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
  loop: "{{ uip_active_agents | default([]) }}"
  failed_when: false
  when: uip_disable_agents | bool
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade

- name: Run application post-upgrade validation hooks
  ansible.builtin.command: "{{ item }}"
  loop: "{{ uip_app_post_validation_cmds }}"
  register: uip_app_post_validation_results
  changed_when: false
  failed_when: false
  when: uip_app_post_validation_cmds | length > 0
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade

- name: Include post-upgrade network cleanup tasks
  ansible.builtin.import_tasks: tasks.d/network_cleanup.yml
  when:
    - uip_network_cleanup_legacy | bool
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade

- name: Write done marker
  ansible.builtin.copy:
    dest: '{{ uip_done_file }}'
    mode: '0640'
    content: 'host: "{{ inventory_hostname }}"

      path: "{{ uip_path_key }}"

      state: "completed"

      repo_mgr: "{{ uip_repo_mgr }}"

      completed_at: "{{ ansible_date_time.iso8601 }}"

      '
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade
- name: Include agent re-enrollment tasks
  ansible.builtin.import_tasks: tasks.d/agent_reenroll.yml
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Run repository post-upgrade validation
  ansible.builtin.include_role:
    name: uip-repos
    apply:
      tags:
        - uip_postcheck
        - uip_postupgrade
        - uip_discovery
        - uip_preupgrade
  vars:
    uip_repo_postupgrade_mode: true
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade

- name: Remove active lock after successful postcheck
  ansible.builtin.file:
    path: '{{ uip_lock_file }}'
    state: absent
  tags:
    - uip_postcheck
    - uip_postupgrade
    - uip_discovery
    - uip_preupgrade

- name: Include service dependency postcheck tasks
  ansible.builtin.import_tasks: tasks.d/dependency_graph_validate.yml
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Include operational health score tasks
  ansible.builtin.import_tasks: tasks.d/health_score.yml
  tags:
    - uip_postcheck
    - uip_postupgrade
