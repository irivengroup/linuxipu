---
- name: Prepare SUSE ifcfg files for predicted interface names
  ansible.builtin.shell: |
    set -o pipefail
    old="{{ item.current }}"
    new="{{ item.predicted }}"
    src="/etc/sysconfig/network/ifcfg-${old}"
    dst="/etc/sysconfig/network/ifcfg-${new}"
    if [ "$old" != "$new" ] && [ -f "$src" ] && [ ! -f "$dst" ]; then
      cp -a "$src" "$dst"
      echo "created ${dst}"
    fi
  args:
    executable: /bin/bash
  loop: "{{ uip_network_future_ifaces | default([]) }}"
  register: uip_network_suse_ifcfg_prepare
  changed_when: "'created' in (uip_network_suse_ifcfg_prepare.stdout | default(''))"
  failed_when: false
  when:
    - uip_network_future_apply | bool
  tags:
    - uip_upgrade
    - uip_postupgrade
