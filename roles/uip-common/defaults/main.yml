---
uip_mode: enforce
uip_resume: false
uip_serial: 1
uip_lock_dir: /var/lib/uip
uip_lock_file: /var/lib/uip/upgrade.lock
uip_done_file: /var/lib/uip/upgrade.done
uip_state_file: /var/lib/uip/state.yml
uip_log_dir: /var/log/uip
uip_report_dir: /var/log/uip/reports
uip_allow_skip: false
uip_allow_reboot: true
uip_repo_mgr: auto
uip_repo_detect: true
uip_repo_validate: true
uip_repo_gpg: true
uip_repo_freeze: true
uip_repo_enforce_target: true
uip_snap_enabled: true
uip_snap_type: none
uip_snap_ttl_h: 72
uip_pre_min_root_mb: 8192
uip_pre_min_boot_mb: 512
uip_pre_min_var_mb: 6144
uip_pre_min_tmp_mb: 4096
uip_svc_crit:
  - sshd
uip_ports_crit:
  - 22
uip_health_cmds:
  - systemctl is-system-running || true
  - systemctl --failed || true
uip_update_before_upgrade: true
uip_update_autoremove: false
uip_update_clean_cache: true
uip_reboot_timeout: 2700
uip_reboot_connect_timeout: 30
uip_reboot_pre_delay: 5
uip_reboot_post_delay: 20
uip_reboot_state_file: /var/lib/uip/reboot-state.yml
uip_reboot_current_step: unknown
uip_reboot_next_step: unknown
uip_remediate_fs_size_threshold_mb: 2048
uip_remediate_fstab_backup: "/etc/before-uip.fstab.original"
uip_remediate_fstab_network_prefix: "##-UIP-##"
uip_remediate_kernel_keep: 2
uip_remediate_boot_cleanup: true
uip_remediate_lvm_extend: true
uip_remediate_grub_reconfigure: true
uip_remediate_fix_inhibitors: true
uip_remediate_comment_network_mounts: true

uip_rhel6_to_7_instrepo: ""

uip_pre_dns_targets: []

uip_pre_repo_health_urls: []

uip_pre_min_boot_inode_pct_free: 5

uip_pre_min_var_lib_leapp_mb: 4096

uip_disable_agents: true

uip_disable_patch_automation: true

uip_app_pre_snapshot_cmds: []

uip_app_post_validation_cmds: []

uip_initramfs_rebuild: true

uip_validate_grubby: true

uip_selinux_relabel_onboot: false

uip_report_final_file: "{{ uip_report_dir }}/uip-final-report.yml"

uip_agent_services:
  - falcon-sensor
  - sentinelone
  - sentineld
  - taniumclient
  - qualys-cloud-agent
  - ds_agent
  - cbdaemon
  - puppet
  - chef-client
  - salt-minion

uip_patch_automation_services:
  - unattended-upgrades
  - apt-daily.timer
  - apt-daily-upgrade.timer
  - dnf-automatic.timer
  - yum-cron
  - packagekit

uip_reboot_max_attempts: 2

uip_reboot_guard_file: "{{ uip_state_dir }}/reboot-guard.yml"

uip_lock_stale_hours: 24

uip_lock_allow_stale_override: false

uip_lock_enforce_same_path: true

uip_lock_block_completed: true

uip_lock_active_state: "active"

uip_lock_completed_state: "completed"

uip_rollback_enabled: true

uip_rollback_require_state: true

uip_rollback_restore_fstab: true

uip_rollback_restore_repos: true

uip_rollback_restart_agents: true

uip_rollback_clear_lock: false

uip_rollback_hooks: []

uip_rollback_report_file: "{{ uip_report_dir }}/rollback-report.yml"

uip_pre_min_boot_efi_mb: 512

uip_bootloader_validate_config: true

uip_bootloader_bootability_checks: true

uip_bootloader_require_kernel_entry: true

uip_bootloader_require_initramfs: true

uip_bootloader_require_efi_entry: true

uip_network_future_prepare: true

uip_network_future_fail_on_high_risk: true

uip_network_future_apply: true

uip_network_cleanup_legacy: true

uip_network_backup_dir: "{{ uip_backup_dir | default(uip_state_dir ~ '/backup') }}/network"

uip_network_future_report: "{{ uip_report_dir }}/network-future-state.yml"

uip_bootloader_backup_enabled: true

uip_bootloader_backup_dir: "{{ uip_backup_dir | default(uip_state_dir ~ '/backup') }}/bootloader"

uip_snapshot_required_for_vm: true

uip_snapshot_skip_physical: true

uip_snapshot_api_timeout: 60

uip_snapshot_name_prefix: uip

uip_snapshot_state_file: "{{ uip_state_dir }}/snapshot.yml"

uip_snapshot_report_file: "{{ uip_report_dir }}/snapshot.yml"

uip_vmprovider_region: ""

uip_vmprovider_datacenter: ""

uip_snapshot_verify_completion: true

uip_snapshot_poll_retries: 30

uip_snapshot_poll_delay: 20

uip_snapshot_fail_if_unverified: true

uip_rollback_provider_restore_enabled: false

uip_network_validate_future_routes: true

uip_network_validate_future_dns: true

uip_network_validate_bond_vlan_bridge: true

uip_bootability_validate_default_entry: true

uip_bootability_validate_rescue: true

uip_fs_lvm_safety_checks: true

uip_repo_validate_target_package: true

uip_repo_validation_packages: ["bash"]

uip_monitoring_maintenance_enabled: false

uip_monitoring_maintenance_hooks: []

uip_agent_reenroll_hooks: []

uip_decision_report_file: "{{ uip_report_dir }}/uip-decision-report.yml"

uip_decision_report_fail_on_critical: false

uip_change_window_enforced: false

uip_allowed_change_days: ['sat', 'sun']

uip_allowed_change_start: "22:00"

uip_allowed_change_end: "05:00"

uip_breakglass_enabled: false

uip_breakglass_reason: ""

uip_staged_reboot_enabled: false

uip_drift_detection_enabled: true

uip_health_scoring_enabled: true

uip_maintenance_mode_enabled: false

uip_maintenance_enter_hooks: []

uip_maintenance_exit_hooks: []

uip_dependency_graph_enabled: true

uip_dependency_graph_services: []

uip_kernel_panic_capture_enabled: true

uip_kernel_panic_capture_apply: false

uip_kernel_panic_timeout: 30

uip_kernel_panic_oops: true

uip_kernel_console_args: ""

uip_breakglass_operator: ""

uip_breakglass_ticket: ""

uip_breakglass_expires_at: ""

uip_repo_src_ak: ""

uip_repo_dst_ak: ""

uip_repo_src_env: ""

uip_repo_dst_env: ""

uip_repo_src_content_view: ""

uip_repo_dst_content_view: ""

uip_repo_explicit_binding_required: false

uip_repo_manager_bindings: {}

uip_repo_binding_state_file: "{{ uip_state_dir }}/repo-binding.yml"

uip_repo_binding_report_file: "{{ uip_report_dir }}/repo-binding.yml"
