---
uip_paths:
  rhel:
    "6":
      "7":
        key: "rhel:6:7"
        pkg_mgr: "yum"
        pre_tool: "preupg"
        upg_tool: "redhat-upgrade-tool"
        src_name: "rhel6"
        dst_name: "rhel7"
    "7":
      "8":
        key: "rhel:7:8"
        pkg_mgr: "yum"
        pre_tool: "leapp preupgrade"
        upg_tool: "leapp"
        src_name: "rhel7"
        dst_name: "rhel8"
    "8":
      "9":
        key: "rhel:8:9"
        pkg_mgr: "dnf"
        pre_tool: "leapp preupgrade"
        upg_tool: "leapp"
        src_name: "rhel8"
        dst_name: "rhel9"

  ubuntu:
    "18.04":
      "20.04":
        key: "ubuntu:18.04:20.04"
        pkg_mgr: "apt"
        pre_tool: "do-release-upgrade -c"
        upg_tool: "do-release-upgrade"
        src_name: "bionic"
        dst_name: "focal"
    "20.04":
      "22.04":
        key: "ubuntu:20.04:22.04"
        pkg_mgr: "apt"
        pre_tool: "do-release-upgrade -c"
        upg_tool: "do-release-upgrade"
        src_name: "focal"
        dst_name: "jammy"
    "22.04":
      "24.04":
        key: "ubuntu:22.04:24.04"
        pkg_mgr: "apt"
        pre_tool: "do-release-upgrade -c"
        upg_tool: "do-release-upgrade"
        src_name: "jammy"
        dst_name: "noble"

  debian:
    "10":
      "11":
        key: "debian:10:11"
        pkg_mgr: "apt"
        pre_tool: "apt-get -s dist-upgrade"
        upg_tool: "apt-get dist-upgrade"
        src_name: "buster"
        dst_name: "bullseye"
    "11":
      "12":
        key: "debian:11:12"
        pkg_mgr: "apt"
        pre_tool: "apt-get -s dist-upgrade"
        upg_tool: "apt-get dist-upgrade"
        src_name: "bullseye"
        dst_name: "bookworm"
    "12":
      "13":
        key: "debian:12:13"
        pkg_mgr: "apt"
        pre_tool: "apt-get -s dist-upgrade"
        upg_tool: "apt-get dist-upgrade"
        src_name: "bookworm"
        dst_name: "trixie"

  sles:
    "12-sp5":
      "15-sp3":
        key: "sles:12-sp5:15-sp3"
        pkg_mgr: "zypper"
        pre_tool: "zypper migration --dry-run"
        upg_tool: "zypper migration"
        src_name: "sles12-sp5"
        dst_name: "sles15-sp3"
    "15-sp3":
      "15-sp4":
        key: "sles:15-sp3:15-sp4"
        pkg_mgr: "zypper"
        pre_tool: "zypper migration --dry-run"
        upg_tool: "zypper migration"
        src_name: "sles15-sp3"
        dst_name: "sles15-sp4"
    "15-sp4":
      "15-sp5":
        key: "sles:15-sp4:15-sp5"
        pkg_mgr: "zypper"
        pre_tool: "zypper migration --dry-run"
        upg_tool: "zypper migration"
        src_name: "sles15-sp4"
        dst_name: "sles15-sp5"

uip_repo_detect_rules:
  satellite:
    files:
      - "/etc/rhsm/rhsm.conf"
      - "/etc/yum/pluginconf.d/subscription-manager.conf"
    patterns:
      - "satellite"
      - "katello"
      - "capsule"
  landscape:
    files:
      - "/etc/landscape/client.conf"
    patterns:
      - "landscape"
  suse_mgr:
    files:
      - "/etc/sysconfig/rhn/systemid"
      - "/etc/zypp/repos.d/susemanager:channels.repo"
    patterns:
      - "susemanager"
      - "suse-manager"
  uyuni:
    files:
      - "/etc/sysconfig/rhn/systemid"
    patterns:
      - "uyuni"
  artifactory:
    patterns:
      - "artifactory"
      - "jfrog"
  nexus:
    patterns:
      - "nexus"
      - "sonatype"
  pulp:
    patterns:
      - "pulp"
  airgap:
    patterns:
      - "file:/"
      - "file://"
      - "/mnt/repos"
      - "/media/repos"

uip_repo_map:
  rhel:
    "6":
      "7":
        satellite:
          src_cv: "cv-rhel6-prod"
          dst_cv: "cv-rhel7-prod"
          src_lce: "PROD"
          dst_lce: "PROD"
          src_ak: "ak-rhel6-prod"
          dst_ak: "ak-rhel7-prod"
          repos_enable:
            - "rhel-7-server-rpms"
            - "rhel-7-server-extras-rpms"
          repos_disable:
            - "rhel-6-server-rpms"
          target_urls:
            - "https://satellite.example.com/pulp/content/PROD/cv-rhel7-prod/content/dist/rhel/server/7/7Server/x86_64/os"
        artifactory:
          base_url: "https://artifactory.example.com/artifactory"
          src_repo: "rpm-rhel6-prod"
          dst_repo: "rpm-rhel7-prod"
          dst_url: "https://artifactory.example.com/artifactory/rpm-rhel7-prod"
          gpg_key: "file:///etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release"
        nexus:
          base_url: "https://nexus.example.com/repository"
          src_repo: "rhel6-prod"
          dst_repo: "rhel7-prod"
          dst_url: "https://nexus.example.com/repository/rhel7-prod"
        pulp:
          base_url: "https://pulp.example.com"
          src_repo: "rhel6-prod"
          dst_repo: "rhel7-prod"
          dst_url: "https://pulp.example.com/pulp/content/rhel7-prod"
        airgap:
          src_mount: "/mnt/repos/rhel6"
          dst_mount: "/mnt/repos/rhel7"
          dst_url: "file:///mnt/repos/rhel7"
          dst_repo_file: "/etc/yum.repos.d/uip-rhel7.repo"
        native:
          repos_enable: []
          repos_disable: []

    "7":
      "8":
        satellite:
          src_cv: "cv-rhel7-prod"
          dst_cv: "cv-rhel8-prod"
          src_lce: "PROD"
          dst_lce: "PROD"
          src_ak: "ak-rhel7-prod"
          dst_ak: "ak-rhel8-prod"
          repos_enable:
            - "rhel-8-for-x86_64-baseos-rpms"
            - "rhel-8-for-x86_64-appstream-rpms"
          repos_disable:
            - "rhel-7-server-rpms"
          target_urls:
            - "https://satellite.example.com/pulp/content/PROD/cv-rhel8-prod/content/dist/rhel8/8/x86_64/baseos/os"
            - "https://satellite.example.com/pulp/content/PROD/cv-rhel8-prod/content/dist/rhel8/8/x86_64/appstream/os"
        artifactory:
          base_url: "https://artifactory.example.com/artifactory"
          src_repo: "rpm-rhel7-prod"
          dst_repo: "rpm-rhel8-prod"
          dst_url: "https://artifactory.example.com/artifactory/rpm-rhel8-prod"
          gpg_key: "file:///etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release"
        nexus:
          base_url: "https://nexus.example.com/repository"
          src_repo: "rhel7-prod"
          dst_repo: "rhel8-prod"
          dst_url: "https://nexus.example.com/repository/rhel8-prod"
        pulp:
          base_url: "https://pulp.example.com"
          src_repo: "rhel7-prod"
          dst_repo: "rhel8-prod"
          dst_url: "https://pulp.example.com/pulp/content/rhel8-prod"
        airgap:
          src_mount: "/mnt/repos/rhel7"
          dst_mount: "/mnt/repos/rhel8"
          dst_url: "file:///mnt/repos/rhel8"
          dst_repo_file: "/etc/yum.repos.d/uip-rhel8.repo"
        native:
          repos_enable: []
          repos_disable: []

  ubuntu:
    "18.04":
      "20.04":
        landscape:
          src_series: "bionic"
          dst_series: "focal"
          profile: "ubuntu-20.04-prod"
          target_urls:
            - "https://archive.ubuntu.com/ubuntu"
        artifactory:
          base_url: "https://artifactory.example.com/artifactory"
          src_repo: "deb-bionic-prod"
          dst_repo: "deb-focal-prod"
          dst_url: "https://artifactory.example.com/artifactory/deb-focal-prod"
          dst_suite: "focal"
          components:
            - "main"
            - "universe"
            - "restricted"
            - "multiverse"
          gpg_key_url: "https://artifactory.example.com/keys/ubuntu-focal.gpg"
        nexus:
          base_url: "https://nexus.example.com/repository"
          src_repo: "ubuntu-bionic"
          dst_repo: "ubuntu-focal"
          dst_url: "https://nexus.example.com/repository/ubuntu-focal"
          dst_suite: "focal"
          components:
            - "main"
        pulp:
          base_url: "https://pulp.example.com"
          src_repo: "ubuntu-bionic"
          dst_repo: "ubuntu-focal"
          dst_url: "https://pulp.example.com/pulp/content/ubuntu-focal"
          dst_suite: "focal"
          components:
            - "main"
        airgap:
          src_mount: "/mnt/repos/ubuntu/bionic"
          dst_mount: "/mnt/repos/ubuntu/focal"
          dst_url: "file:/mnt/repos/ubuntu/focal"
          dst_suite: "focal"
          dst_list_file: "/etc/apt/sources.list.d/uip-focal.list"
        native:
          dst_url: "http://archive.ubuntu.com/ubuntu"
          dst_suite: "focal"
          components:
            - "main"
            - "universe"
            - "restricted"
            - "multiverse"

  debian:
    "11":
      "12":
        artifactory:
          base_url: "https://artifactory.example.com/artifactory"
          src_repo: "deb-bullseye-prod"
          dst_repo: "deb-bookworm-prod"
          dst_url: "https://artifactory.example.com/artifactory/deb-bookworm-prod"
          dst_suite: "bookworm"
          components:
            - "main"
            - "contrib"
            - "non-free"
            - "non-free-firmware"
        nexus:
          base_url: "https://nexus.example.com/repository"
          src_repo: "debian-bullseye"
          dst_repo: "debian-bookworm"
          dst_url: "https://nexus.example.com/repository/debian-bookworm"
          dst_suite: "bookworm"
          components:
            - "main"
        pulp:
          base_url: "https://pulp.example.com"
          src_repo: "debian-bullseye"
          dst_repo: "debian-bookworm"
          dst_url: "https://pulp.example.com/pulp/content/debian-bookworm"
          dst_suite: "bookworm"
          components:
            - "main"
        airgap:
          src_mount: "/mnt/repos/debian/bullseye"
          dst_mount: "/mnt/repos/debian/bookworm"
          dst_url: "file:/mnt/repos/debian/bookworm"
          dst_suite: "bookworm"
          dst_list_file: "/etc/apt/sources.list.d/uip-bookworm.list"
        native:
          dst_url: "http://deb.debian.org/debian"
          dst_suite: "bookworm"
          components:
            - "main"
            - "contrib"
            - "non-free"
            - "non-free-firmware"

  sles:
    "15-sp4":
      "15-sp5":
        suse_mgr:
          src_channel: "sles15-sp4-prod"
          dst_channel: "sles15-sp5-prod"
          activation_key: "ak-sles15-sp5-prod"
          migration_target: "SLES 15 SP5 x86_64"
          target_urls:
            - "https://susemanager.example.com/pub/repositories/sles15sp5"
        uyuni:
          src_channel: "sles15-sp4-prod"
          dst_channel: "sles15-sp5-prod"
          activation_key: "ak-sles15-sp5-prod"
          target_urls:
            - "https://uyuni.example.com/pub/repositories/sles15sp5"
        artifactory:
          base_url: "https://artifactory.example.com/artifactory"
          src_repo: "rpm-sles15sp4-prod"
          dst_repo: "rpm-sles15sp5-prod"
          dst_url: "https://artifactory.example.com/artifactory/rpm-sles15sp5-prod"
        airgap:
          src_mount: "/mnt/repos/sles/15sp4"
          dst_mount: "/mnt/repos/sles/15sp5"
          dst_url: "file:///mnt/repos/sles/15sp5"
          dst_repo_file: "/etc/zypp/repos.d/uip-sles15sp5.repo"
        native:
          migration_target: "SLES 15 SP5 x86_64"
