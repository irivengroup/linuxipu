---
- name: Run agent re-enrollment hooks after upgrade
  ansible.builtin.command: "{{ item }}"
  loop: "{{ uip_agent_reenroll_hooks }}"
  register: uip_agent_reenroll_results
  changed_when: true
  failed_when: false
  when: uip_agent_reenroll_hooks | length > 0
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Persist agent re-enrollment report
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/agent-reenroll.yml"
    owner: root
    group: root
    mode: "0640"
    content: "{{ uip_agent_reenroll_results.results | default([]) | to_nice_yaml }}"
  tags:
    - uip_postcheck
    - uip_postupgrade
