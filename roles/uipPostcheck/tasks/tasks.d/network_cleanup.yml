---
- name: Check future network report
  ansible.builtin.stat:
    path: "{{ uip_network_future_report }}"
  register: uip_post_network_report_stat
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Read future network report
  ansible.builtin.slurp:
    src: "{{ uip_network_future_report }}"
  register: uip_post_network_report_raw
  when: uip_post_network_report_stat.stat.exists
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Decode future network report
  ansible.builtin.set_fact:
    uip_post_network_report: "{{ uip_post_network_report_raw.content | b64decode | from_yaml }}"
  when: uip_post_network_report_stat.stat.exists
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Remove stale RHEL ifcfg files after successful interface rename
  ansible.builtin.file:
    path: "/etc/sysconfig/network-scripts/ifcfg-{{ item.current }}"
    state: absent
  loop: "{{ uip_post_network_report.interfaces | default([]) }}"
  when:
    - uip_os == "rhel"
    - item.rename | bool
    - item.predicted in ansible_interfaces
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Remove stale SUSE ifcfg files after successful interface rename
  ansible.builtin.file:
    path: "/etc/sysconfig/network/ifcfg-{{ item.current }}"
    state: absent
  loop: "{{ uip_post_network_report.interfaces | default([]) }}"
  when:
    - uip_os == "sles"
    - item.rename | bool
    - item.predicted in ansible_interfaces
  tags:
    - uip_postcheck
    - uip_postupgrade

- name: Persist network cleanup report
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/network-cleanup.yml"
    owner: root
    group: root
    mode: "0640"
    content: |
      cleanup_enabled: "{{ uip_network_cleanup_legacy }}"
      active_interfaces:
      {{ ansible_interfaces | default([]) | to_nice_yaml(indent=2) | indent(2, true) }}
      predicted_interfaces:
      {{ uip_post_network_report.interfaces | default([]) | to_nice_yaml(indent=2) | indent(2, true) }}
  tags:
    - uip_postcheck
    - uip_postupgrade
