---
- name: Check existing lock
  ansible.builtin.stat:
    path: "{{ uip_lock_file }}"
  register: uip_lock_stat
  tags:
    - uip_lock

- name: Read existing lock
    - uip_preupgrade
  ansible.builtin.slurp:
    src: "{{ uip_lock_file }}"
  register: uip_lock_raw
  when: uip_lock_stat.stat.exists
  tags:
    - uip_lock

- name: Decode existing lock
  ansible.builtin.set_fact:
    uip_lock_data: "{{ uip_lock_raw.content | b64decode | from_yaml }}"
  when: uip_lock_stat.stat.exists
  tags:
    - uip_lock

- name: Assert existing lock matches current upgrade path
  ansible.builtin.assert:
    that:
      - uip_resume | bool
      - uip_lock_data.path == uip_path_key
      - uip_lock_data.dst_ver | string == uip_dst_ver | string
    fail_msg: "Existing lock blocks this run. Use uip_resume=true only for the same path."
  when: uip_lock_stat.stat.exists
  tags:
    - uip_lock

- name: Create upgrade lock
  ansible.builtin.copy:
    dest: "{{ uip_lock_file }}"
    owner: root
    group: root
    mode: "0640"
    content: |
      id: "{{ inventory_hostname }}-{{ uip_path_key }}"
      host: "{{ inventory_hostname }}"
      distro: "{{ uip_os }}"
      src_ver: "{{ uip_src_ver }}"
      dst_ver: "{{ uip_dst_ver }}"
      path: "{{ uip_path_key }}"
      state: "created"
      repo_mgr: "{{ uip_repo_mgr }}"
      started_at: "{{ ansible_date_time.iso8601 }}"
      updated_at: "{{ ansible_date_time.iso8601 }}"
  when: not uip_lock_stat.stat.exists
  tags:
    - uip_lock
