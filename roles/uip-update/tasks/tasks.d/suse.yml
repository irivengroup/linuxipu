---
- name: Refresh zypper cache
  ansible.builtin.command: zypper --non-interactive refresh
  changed_when: false
  tags:
    - uip_update_suse
    - uip_preupgrade
    - uip_suse
- name: Update current SUSE baseline before OS upgrade
  ansible.builtin.command: zypper --non-interactive update
  register: uip_suse_update
  changed_when: '''Nothing to do'' not in uip_suse_update.stdout'
  tags:
    - uip_update_suse
    - uip_preupgrade
    - uip_suse
- name: Clean zypper cache
  ansible.builtin.command: zypper clean --all
  changed_when: false
  when: uip_update_clean_cache | bool
  tags:
    - uip_update_suse
    - uip_preupgrade
    - uip_suse
- name: Check SUSE reboot-needed marker
  ansible.builtin.stat:
    path: /var/run/reboot-needed
  register: uip_reboot_required_suse_marker
  tags:
    - uip_update_suse
    - uip_update_reboot_check
    - uip_preupgrade
    - uip_suse
- name: Check SUSE reboot requirement with zypper ps
  ansible.builtin.command: zypper ps --requires-reboot
  register: uip_reboot_required_suse
  changed_when: false
  failed_when: false
  tags:
    - uip_update_suse
    - uip_update_reboot_check
    - uip_preupgrade
    - uip_suse
- name: Set SUSE reboot-required fact after baseline update
  ansible.builtin.set_fact:
    uip_update_reboot_required: "{{\n  (uip_reboot_required_suse_marker.stat.exists | default(false))\n  or\n  (uip_reboot_required_suse.rc\
      \ | default(0) != 0)\n}}"
  tags:
    - uip_update_suse
    - uip_update_reboot_check
    - uip_preupgrade
    - uip_suse
- name: Report SUSE reboot requirement after baseline update
  ansible.builtin.debug:
    msg: 'Baseline update reboot required: {{ uip_update_reboot_required }}'
  tags:
    - uip_update_suse
    - uip_update_reboot_check
    - uip_preupgrade
    - uip_suse
