---
- name: Ensure yum-utils is installed for needs-restarting on RHEL
  ansible.builtin.package:
    name: yum-utils
    state: present
  when: uip_pkg_mgr == "yum"
  tags:
    - uip_update_rhel
    - uip_preupgrade
    - uip_rhel
- name: Ensure dnf-utils is installed for needs-restarting on RHEL
  ansible.builtin.package:
    name: dnf-utils
    state: present
  when: uip_pkg_mgr == "dnf"
  tags:
    - uip_update_rhel
    - uip_preupgrade
    - uip_rhel
- name: Update current RHEL baseline before OS upgrade
  ansible.builtin.package:
    name: '*'
    state: latest
  tags:
    - uip_update_rhel
    - uip_preupgrade
    - uip_rhel
- name: Clean RPM package cache
  ansible.builtin.command: '{{ ''dnf clean all'' if uip_pkg_mgr == ''dnf'' else ''yum clean all'' }}'
  changed_when: false
  when: uip_update_clean_cache | bool
  tags:
    - uip_update_rhel
    - uip_preupgrade
    - uip_rhel
- name: Check RHEL reboot requirement with needs-restarting
  ansible.builtin.command: needs-restarting -r
  register: uip_reboot_required_rhel
  changed_when: false
  failed_when: false
  tags:
    - uip_update_rhel
    - uip_update_reboot_check
    - uip_preupgrade
    - uip_rhel
- name: Set RHEL reboot-required fact after baseline update
  ansible.builtin.set_fact:
    uip_update_reboot_required: '{{ uip_reboot_required_rhel.rc | default(0) != 0 }}'
  tags:
    - uip_update_rhel
    - uip_update_reboot_check
    - uip_preupgrade
    - uip_rhel
- name: Report RHEL reboot requirement after baseline update
  ansible.builtin.debug:
    msg: 'Baseline update reboot required: {{ uip_update_reboot_required }}'
  tags:
    - uip_update_rhel
    - uip_update_reboot_check
    - uip_preupgrade
    - uip_rhel
