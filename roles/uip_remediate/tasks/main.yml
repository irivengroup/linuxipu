---
- name: Include precheck report parsing tasks
  ansible.builtin.import_tasks: tasks.d/precheck_report.yml
  tags:
    - uip_remediate
    - uip_preupgrade


- name: Include catalog-driven remediation tasks
  ansible.builtin.import_tasks: tasks.d/catalog_remediation.yml
  when:
    - uip_remediate_use_precheck_report | bool
  tags:
    - uip_remediate
    - uip_preupgrade
- name: Include vendor alignment remediation tasks
  ansible.builtin.import_tasks: tasks.d/vendor_alignment.yml
  when:
    - uip_remediate_run_inhibitors | bool
  tags:
    - uip_remediate
    - uip_preupgrade

- name: Include common remediation tasks
  ansible.builtin.import_tasks: tasks.d/common.yml
  when:
    - uip_remediate_run_common | bool
  tags:
    - uip_remediate
    - uip_preupgrade

- name: Include fstab remediation tasks
  ansible.builtin.import_tasks: tasks.d/fstab.yml
  when:
    - uip_remediate_run_fstab | bool
  tags:
    - uip_remediate
    - uip_remediate_fstab
    - uip_preupgrade

- name: Include filesystem remediation tasks
  ansible.builtin.import_tasks: tasks.d/filesystems.yml
  when:
    - uip_remediate_run_filesystems | bool
  tags:
    - uip_remediate
    - uip_remediate_fs
    - uip_preupgrade

- name: Include monitoring maintenance tasks
  ansible.builtin.import_tasks: tasks.d/monitoring.yml
  tags:
    - uip_remediate
    - uip_preupgrade

- name: Include disruptive agent remediation tasks
  ansible.builtin.import_tasks: tasks.d/agents.yml
  when:
    - uip_remediate_run_agents | bool
  tags:
    - uip_remediate
    - uip_remediate_agents
    - uip_preupgrade

- name: Include kernel panic capture tasks
  ansible.builtin.import_tasks: tasks.d/kernel_panic_capture.yml
  tags:
    - uip_remediate
    - uip_preupgrade

- name: Include bootloader backup tasks
  ansible.builtin.import_tasks: tasks.d/bootloader_backup.yml
  when:
    - uip_bootloader_backup_enabled | bool
    - uip_remediate_run_boot | bool
  tags:
    - uip_remediate
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Include RHEL remediation tasks
  ansible.builtin.import_tasks: tasks.d/rhel/main.yml
  when:
    - uip_os == "rhel"
    - uip_remediate_run_inhibitors | bool
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_preupgrade

- name: Include Debian remediation tasks
  ansible.builtin.import_tasks: tasks.d/debian/main.yml
  when:
    - uip_os == "debian"
    - uip_remediate_run_inhibitors | bool
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_preupgrade

- name: Include Ubuntu remediation tasks
  ansible.builtin.import_tasks: tasks.d/ubuntu/main.yml
  when:
    - uip_os == "ubuntu"
    - uip_remediate_run_inhibitors | bool
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_preupgrade

- name: Include SUSE remediation tasks
  ansible.builtin.import_tasks: tasks.d/suse/main.yml
  when:
    - uip_os == "sles"
    - uip_remediate_run_inhibitors | bool
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_preupgrade

- name: Include maintenance mode tasks
  ansible.builtin.import_tasks: tasks.d/maintenance_mode.yml
  tags:
    - uip_remediate
    - uip_preupgrade
