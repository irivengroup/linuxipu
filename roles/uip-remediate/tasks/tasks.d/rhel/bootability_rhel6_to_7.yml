---

- name: Capture RHEL root mount source
  ansible.builtin.command: findmnt -n -o SOURCE --target /
  register: uip_root_source
  changed_when: false
  failed_when: uip_root_source.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL fstab content
  ansible.builtin.slurp:
    src: /etc/fstab
  register: uip_fstab_raw
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Validate RHEL root source is present in fstab
  ansible.builtin.assert:
    that:
      - (uip_fstab_raw.content | b64decode) is search(uip_root_source.stdout | regex_escape)
    fail_msg: "RHEL root filesystem source is not aligned with /etc/fstab."
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL blkid inventory
  ansible.builtin.command: blkid
  register: uip_blkid
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL mdraid state
  ansible.builtin.command: cat /proc/mdstat
  register: uip_mdstat
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL multipath state
  ansible.builtin.command: multipath -ll
  register: uip_multipath
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Detect RHEL firmware mode
  ansible.builtin.stat:
    path: /sys/firmware/efi
  register: uip_bootability_efi_stat
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Detect RHEL running kernel
  ansible.builtin.command: uname -r
  register: uip_bootability_running_kernel
  changed_when: false
  failed_when: uip_bootability_running_kernel.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Set RHEL 6 bootability facts
  ansible.builtin.set_fact:
    uip_boot_mode: "{{ 'uefi' if uip_bootability_efi_stat.stat.exists else 'bios' }}"
    uip_bootability_grub_cfg: "{{ '/boot/efi/EFI/redhat/grub.conf' if uip_bootability_efi_stat.stat.exists else '/boot/grub/grub.conf' }}"
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Rebuild RHEL 6 initramfs
  ansible.builtin.command: dracut -f --regenerate-all
  register: uip_dracut_regen
  changed_when: true
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL 6 initramfs inventory
  ansible.builtin.command: lsinitrd
  register: uip_lsinitrd
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check RHEL 6 kernel image exists
  ansible.builtin.stat:
    path: "/boot/vmlinuz-{{ uip_bootability_running_kernel.stdout }}"
  register: uip_bootability_kernel_img
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check RHEL 6 initramfs exists
  ansible.builtin.stat:
    path: "/boot/initramfs-{{ uip_bootability_running_kernel.stdout }}.img"
  register: uip_bootability_initramfs
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check RHEL 6 GRUB legacy configuration exists
  ansible.builtin.stat:
    path: "{{ uip_bootability_grub_cfg }}"
  register: uip_bootability_grub_cfg_stat
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Assert RHEL 6 boot artifacts are bootable
  ansible.builtin.assert:
    that:
      - uip_bootability_kernel_img.stat.exists
      - uip_bootability_kernel_img.stat.size | int > 0
      - uip_bootability_initramfs.stat.exists
      - uip_bootability_initramfs.stat.size | int > 0
      - uip_bootability_grub_cfg_stat.stat.exists
      - uip_bootability_grub_cfg_stat.stat.size | int > 0
    fail_msg: "RHEL 6 bootability check failed: kernel, initramfs or GRUB legacy config is missing."
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Verify RHEL 6 running kernel appears in GRUB legacy configuration
  ansible.builtin.command: "grep -F {{ uip_bootability_running_kernel.stdout }} {{ uip_bootability_grub_cfg }}"
  register: uip_bootability_kernel_in_grub
  changed_when: false
  failed_when: uip_bootability_kernel_in_grub.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Validate RHEL sshd configuration syntax
  ansible.builtin.command: sshd -t
  register: uip_sshd_check
  changed_when: false
  failed_when: uip_sshd_check.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Validate RHEL sudoers syntax
  ansible.builtin.command: visudo -c
  register: uip_visudo_check
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL SELinux status
  ansible.builtin.command: sestatus
  register: uip_selinux_status
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL loaded modules
  ansible.builtin.command: lsmod
  register: uip_lsmod
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL DKMS state
  ansible.builtin.command: dkms status
  register: uip_dkms
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture RHEL kmod packages
  ansible.builtin.shell: |
    set -o pipefail
    rpm -qa | grep -i kmod || true
  args:
    executable: /bin/bash
  register: uip_kmods_rpm
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Persist RHEL 6 to 7 bootability report
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/bootability-rhel6-to-7.yml"
    owner: root
    group: root
    mode: "0640"
    content: |
      root_source: "{{ uip_root_source.stdout }}"
      grub_cfg: "{{ uip_bootability_grub_cfg }}"
      running_kernel: "{{ uip_bootability_running_kernel.stdout }}"
      blkid: |
      {{ uip_blkid.stdout | default('') | indent(2, true) }}
      mdraid: |
      {{ uip_mdstat.stdout | default('') | indent(2, true) }}
      multipath: |
      {{ uip_multipath.stdout | default('') | indent(2, true) }}
      selinux: |
      {{ uip_selinux_status.stdout | default('') | indent(2, true) }}
      modules: |
      {{ uip_lsmod.stdout | default('') | indent(2, true) }}
      dkms: |
      {{ uip_dkms.stdout | default('') | indent(2, true) }}
      kmods: |
      {{ uip_kmods_rpm.stdout | default('') | indent(2, true) }}
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Capture GRUB default environment when available
  ansible.builtin.command: grub2-editenv list
  register: uip_bootability_grubenv
  changed_when: false
  failed_when: false
  when: uip_bootability_validate_default_entry | bool
  tags:
    - uip_remediate
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check rescue kernel artifacts
  ansible.builtin.shell: |
    set -o pipefail
    ls /boot/*rescue* 2>/dev/null || true
  args:
    executable: /bin/bash
  register: uip_bootability_rescue
  changed_when: false
  failed_when: false
  when: uip_bootability_validate_rescue | bool
  tags:
    - uip_remediate
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Assert rescue boot artifact is available
  ansible.builtin.assert:
    that:
      - uip_bootability_rescue.stdout | length > 0
    fail_msg: "No rescue boot artifact found under /boot."
  when:
    - uip_bootability_validate_rescue | bool
    - uip_os == "rhel"
  tags:
    - uip_remediate
    - uip_remediate_bootloader
    - uip_preupgrade
