---
- name: Fix interrupted dpkg configuration
  ansible.builtin.command: dpkg --configure -a
  register: uip_dpkg_configure
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Fix broken package dependencies
  ansible.builtin.command: apt-get -f install -y
  register: uip_apt_fix
  changed_when: false
  failed_when: false
  environment:
    DEBIAN_FRONTEND: noninteractive
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Refresh apt metadata
  ansible.builtin.apt:
    update_cache: true
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Audit remaining dpkg issues
  ansible.builtin.command: dpkg --audit
  register: uip_dpkg_audit
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Fail if dpkg issues still exist
  ansible.builtin.fail:
    msg: |
      Remaining dpkg issues detected:
      {{ uip_dpkg_audit.stdout }}
  when:
    - uip_dpkg_audit.stdout | length > 0
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Include UBUNTU kernel remediation tasks
  ansible.builtin.import_tasks: kernel.yml
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_kernel
    - uip_preupgrade

- name: Include UBUNTU GRUB remediation tasks
  ansible.builtin.import_tasks: grub.yml
  when: uip_remediate_grub_reconfigure | bool
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_grub
    - uip_preupgrade

- name: Include UBUNTU inhibitor remediation tasks
  ansible.builtin.import_tasks: inhibitors.yml
  when: uip_remediate_fix_inhibitors | bool
  tags:
    - uip_remediate
    - uip_remediate_ubuntu
    - uip_remediate_inhibitors
    - uip_preupgrade
