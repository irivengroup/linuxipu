---
- name: Update UIP state to remediate_started
  ansible.builtin.copy:
    dest: "{{ uip_state_file }}"
    owner: root
    group: root
    mode: "0640"
    content: |
      host: "{{ inventory_hostname }}"
      os: "{{ uip_os }}"
      src_ver: "{{ uip_src_ver }}"
      dst_ver: "{{ uip_dst_ver }}"
      path: "{{ uip_path_key }}"
      repo_mgr: "{{ uip_repo_mgr }}"
      state: "remediate_started"
      updated_at: "{{ ansible_date_time.iso8601 }}"

- name: Clean package manager metadata when safe
  ansible.builtin.command: "{{ 'apt-get clean' if uip_pkg_mgr == 'apt' else 'dnf clean all' if uip_pkg_mgr == 'dnf' else 'yum clean all' if uip_pkg_mgr == 'yum' else 'zypper clean --all' }}"
  changed_when: false
  failed_when: false
