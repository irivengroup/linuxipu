---
- name: Fix interrupted dpkg configuration
  ansible.builtin.command: dpkg --configure -a
  register: uip_dpkg_configure
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Fix broken package dependencies
  ansible.builtin.command: apt-get -f install -y
  register: uip_apt_fix
  changed_when: false
  failed_when: false
  environment:
    DEBIAN_FRONTEND: noninteractive
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Refresh apt metadata
  ansible.builtin.apt:
    update_cache: true
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Verify package consistency before major upgrade
  ansible.builtin.command: apt-get check
  register: uip_apt_check
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Audit remaining dpkg issues
  ansible.builtin.command: dpkg --audit
  register: uip_dpkg_audit
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Fail if package issues still exist
  ansible.builtin.fail:
    msg: |
      Remaining Debian package issues detected

      apt-get check:
      {{ uip_apt_check.stdout }}

      dpkg audit:
      {{ uip_dpkg_audit.stdout }}
  when:
    - uip_apt_check.rc != 0
      or
      (uip_dpkg_audit.stdout | length > 0)
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_dpkg
    - uip_preupgrade

- name: Include DEBIAN kernel remediation tasks
  ansible.builtin.import_tasks: kernel.yml
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_kernel
    - uip_preupgrade

- name: Include DEBIAN GRUB remediation tasks
  ansible.builtin.import_tasks: grub.yml
  when: uip_remediate_grub_reconfigure | bool
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_grub
    - uip_preupgrade

- name: Include DEBIAN inhibitor remediation tasks
  ansible.builtin.import_tasks: inhibitors.yml
  when: uip_remediate_fix_inhibitors | bool
  tags:
    - uip_remediate
    - uip_remediate_debian
    - uip_remediate_inhibitors
    - uip_preupgrade
