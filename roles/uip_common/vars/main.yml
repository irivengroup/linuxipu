---
# UIP common variable bundle.
#
# Files under vars.d are loaded automatically by roles/uip_common/tasks/main.yml.
# This file remains the declarative entry point for the role variable layout.

uip_common_vars_dir: "{{ role_path }}/vars/vars.d"
uip_common_vars_files:
  - upgradePaths.yml
  - repoMapping.yml
  - repoDetection.yml
  - ecosystems.yml
  - services.yml
  - vmproviders.yml
