---
- name: Validate UIP common vars.d directory exists
  ansible.builtin.stat:
    path: "{{ uip_common_vars_dir }}"
  register: uip_common_vars_d_stat
  tags:
    - always
    - uip_common
    - uip_preupgrade
    - uip_postupgrade

- name: Assert UIP common vars.d directory is present
  ansible.builtin.assert:
    that:
      - uip_common_vars_d_stat.stat.isdir | default(false)
    fail_msg: "UIP common vars.d directory is missing: {{ uip_common_vars_dir }}"
  tags:
    - always
    - uip_common
    - uip_preupgrade
    - uip_postupgrade

- name: Validate expected UIP common vars.d files exist
  ansible.builtin.stat:
    path: "{{ uip_common_vars_dir }}/{{ item }}"
  loop: "{{ uip_common_vars_files }}"
  register: uip_common_vars_d_files
  tags:
    - always
    - uip_common
    - uip_preupgrade
    - uip_postupgrade

- name: Assert expected UIP common vars.d files are present
  ansible.builtin.assert:
    that:
      - uip_common_vars_d_files.results
        | selectattr('stat.exists', 'equalto', false)
        | list
        | length == 0
    fail_msg: "One or more expected UIP common vars.d files are missing."
  tags:
    - always
    - uip_common
    - uip_preupgrade
    - uip_postupgrade

- name: Load UIP common vars.d files
  ansible.builtin.include_vars:
    file: "{{ uip_common_vars_dir }}/{{ item }}"
  loop: "{{ uip_common_vars_files }}"
  no_log: "{{ item == 'vmproviders.yml' }}"
  tags:
    - always
    - uip_common
    - uip_preupgrade
    - uip_postupgrade

- name: Validate expected UIP common variables are provisioned
  ansible.builtin.assert:
    that:
      - uip_paths is defined
      - uip_paths | length > 0
      - uip_repo_map is defined
      - uip_repo_map | length > 0
      - uip_repo_detect_rules is defined
      - uip_repo_detect_rules | length > 0
      - uip_app_contracts is defined
      - uip_vmproviders is defined
    fail_msg: >-
      One or more required UIP common variables were not provisioned from
      roles/uip_common/vars/vars.d.
  tags:
    - always
    - uip_common
    - uip_preupgrade
    - uip_postupgrade

- name: Ensure UIP directories exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    owner: root
    group: root
    mode: '0750'
  loop:
    - '{{ uip_lock_dir }}'
    - '{{ uip_log_dir }}'
    - '{{ uip_report_dir }}'
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Normalize distribution name - uip_preupgrade
  ansible.builtin.set_fact:
    uip_os: "{{\n  'rhel' if ansible_distribution in ['RedHat', 'CentOS', 'Rocky', 'AlmaLinux']\n  else 'ubuntu' if ansible_distribution\
      \ == 'Ubuntu'\n  else 'debian' if ansible_distribution == 'Debian'\n  else 'sles' if ansible_distribution in ['SLES',\
      \ 'SLES_SAP', 'openSUSE Leap']\n  else 'unsupported'\n}}"
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Set normalized source version
  ansible.builtin.set_fact:
    uip_src_ver: "{{\n  ansible_distribution_version\n  if uip_os in ['ubuntu']\n  else ansible_distribution_major_version\n\
      \  if uip_os in ['rhel', 'debian']\n  else ansible_distribution_version | lower | regex_replace(' ', '-')\n}}"
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Assert target version is provided
  ansible.builtin.assert:
    that:
      - uip_dst_ver is defined
      - uip_dst_ver | string | length > 0
    fail_msg: uip_dst_ver is mandatory.
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Load supported upgrade path
  ansible.builtin.set_fact:
    uip_path_def: '{{ uip_paths[uip_os][uip_src_ver][uip_dst_ver] | default({}) }}'
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Assert supported N to N+1 path
  ansible.builtin.assert:
    that:
      - uip_path_def | length > 0
    fail_msg: Unsupported path {{ uip_os }} {{ uip_src_ver }} -> {{ uip_dst_ver }}. Only mapped N to N+1 paths are allowed.
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Set normalized upgrade facts
  ansible.builtin.set_fact:
    uip_path_key: '{{ uip_path_def.key }}'
    uip_pkg_mgr: '{{ uip_path_def.pkg_mgr }}'
    uip_pre_tool: '{{ uip_path_def.pre_tool }}'
    uip_upg_tool: '{{ uip_path_def.upg_tool }}'
    uip_src_name: '{{ uip_path_def.src_name }}'
    uip_dst_name: '{{ uip_path_def.dst_name }}'
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Include repo manager auto-detection
  ansible.builtin.import_tasks: tasks.d/repo_detect.yml
  when:
    - uip_repo_detect | bool
    - uip_repo_mgr == "auto"
  tags:
    - always
    - uip_common
    - uip_repo_detect
    - uip_preupgrade
- name: Fallback repo manager to native
  ansible.builtin.set_fact:
    uip_repo_mgr: native
  when:
    - uip_repo_mgr == "auto"
  tags:
    - always
    - uip_common
    - uip_repo_detect
    - uip_preupgrade
- name: Load repository mapping
  ansible.builtin.set_fact:
    uip_repo_def: '{{ uip_repo_map[uip_os][uip_src_ver][uip_dst_ver][uip_repo_mgr] | default({}) }}'
  tags:
    - always
    - uip_common
    - uip_preupgrade
- name: Assert repository mapping exists
  ansible.builtin.assert:
    that:
      - uip_repo_def | length > 0
    fail_msg: No repo mapping for {{ uip_os }} {{ uip_src_ver }} -> {{ uip_dst_ver }} using {{ uip_repo_mgr }}.
  tags:
    - always
    - uip_common
    - uip_preupgrade

- name: Include breakglass audit tasks
  ansible.builtin.import_tasks: tasks.d/breakglass.yml
  tags:
    - always
    - uip_common
    - uip_preupgrade
    - uip_postupgrade
