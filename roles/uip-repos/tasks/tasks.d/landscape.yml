---
- name: Configure Ubuntu LTS release upgrader
  ansible.builtin.lineinfile:
    path: /etc/update-manager/release-upgrades
    regexp: ^Prompt=
    line: Prompt=lts
  tags:
    - uip_repos_landscape
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Configure Landscape target APT source
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/uip-{{ uip_dst_name }}.list
    mode: '0644'
    content: 'deb {{ uip_repo_def.target_urls[0] }} {{ uip_repo_def.dst_series }} main restricted universe multiverse

      deb {{ uip_repo_def.target_urls[0] }} {{ uip_repo_def.dst_series }}-updates main restricted universe multiverse

      deb {{ uip_repo_def.target_urls[0] }} {{ uip_repo_def.dst_series }}-security main restricted universe multiverse

      '
  when: uip_repo_def.target_urls is defined
  tags:
    - uip_repos_landscape
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade


- name: Apply explicit repository binding intent
  ansible.builtin.debug:
    msg:
      - "repo_manager={{ uip_repo_mgr }}"
      - "source_activation_key={{ uip_repo_src_binding | default('') }}"
      - "target_activation_key={{ uip_repo_dst_binding | default('') }}"
      - "source_environment={{ uip_repo_src_environment | default('') }}"
      - "target_environment={{ uip_repo_dst_environment | default('') }}"
      - "source_content_view={{ uip_repo_src_cv | default('') }}"
      - "target_content_view={{ uip_repo_dst_cv | default('') }}"
  when:
    - (uip_repo_dst_binding | default('') | length > 0)
      or (uip_repo_dst_environment | default('') | length > 0)
      or (uip_repo_dst_cv | default('') | length > 0)
  tags:
    - uip_discovery
    - uip_preupgrade
    - uip_postcheck
    - uip_postupgrade
