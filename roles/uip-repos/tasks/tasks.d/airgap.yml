---
- name: Assert airgap target repository exists
  ansible.builtin.stat:
    path: '{{ uip_repo_def.dst_mount }}'
  register: uip_airgap
  tags:
    - uip_repos_airgap
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Fail if airgap target repository is missing
  ansible.builtin.fail:
    msg: Airgap target repo {{ uip_repo_def.dst_mount }} is missing.
  when: not uip_airgap.stat.exists
  tags:
    - uip_repos_airgap
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Configure airgap RPM target repository
  ansible.builtin.copy:
    dest: '{{ uip_repo_def.dst_repo_file }}'
    mode: '0644'
    content: '[uip-{{ uip_dst_name }}]

      name=UIP airgap {{ uip_dst_name }}

      baseurl={{ uip_repo_def.dst_url }}

      enabled=1

      gpgcheck={{ 1 if uip_repo_gpg else 0 }}

      '
  when: uip_pkg_mgr in ['yum', 'dnf', 'zypper']
  tags:
    - uip_repos_airgap
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Configure airgap APT target repository
  ansible.builtin.copy:
    dest: '{{ uip_repo_def.dst_list_file }}'
    mode: '0644'
    content: 'deb [trusted={{ uip_apt_trusted }}] {{ uip_repo_def.dst_url }} {{ uip_repo_def.dst_suite }} {{ uip_repo_components
      }}

      '
  vars:
    uip_apt_trusted: '{{ ''no'' if uip_repo_gpg else ''yes'' }}'
    uip_repo_components: '{{ uip_repo_def.components | default([''main'']) | join('' '') }}'
  when: uip_pkg_mgr == "apt"
  tags:
    - uip_repos_airgap
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade


- name: Apply explicit repository binding intent
  ansible.builtin.debug:
    msg:
      - "repo_manager={{ uip_repo_mgr }}"
      - "source_activation_key={{ uip_repo_src_binding | default('') }}"
      - "target_activation_key={{ uip_repo_dst_binding | default('') }}"
      - "source_environment={{ uip_repo_src_environment | default('') }}"
      - "target_environment={{ uip_repo_dst_environment | default('') }}"
      - "source_content_view={{ uip_repo_src_cv | default('') }}"
      - "target_content_view={{ uip_repo_dst_cv | default('') }}"
  when:
    - (uip_repo_dst_binding | default('') | length > 0)
      or (uip_repo_dst_environment | default('') | length > 0)
      or (uip_repo_dst_cv | default('') | length > 0)
  tags:
    - uip_discovery
    - uip_preupgrade
    - uip_postcheck
    - uip_postupgrade
