---
- name: Assert Satellite repository mapping is complete
  ansible.builtin.assert:
    that:
      - uip_repo_def.repos_enable is defined
      - uip_repo_def.repos_enable | length > 0
    fail_msg: Satellite mapping must define repos_enable for {{ uip_path_key }}.
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Check subscription-manager availability
  ansible.builtin.command: command -v subscription-manager
  register: uip_subman_cmd
  changed_when: false
  failed_when: uip_subman_cmd.rc != 0
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Check RHSM identity
  ansible.builtin.command: subscription-manager identity
  register: uip_rhsm_identity
  changed_when: false
  failed_when: false
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Fail when system is not registered to RHSM or Satellite
  ansible.builtin.fail:
    msg: Host is not registered to RHSM/Satellite. Register it before running UIP or select another uip_repo_mgr.
  when: uip_rhsm_identity.rc != 0
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Capture current RHSM status
  ansible.builtin.command: subscription-manager status
  register: uip_rhsm_status
  changed_when: false
  failed_when: false
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Save RHSM status report
  ansible.builtin.copy:
    dest: '{{ uip_report_dir }}/rhsm-status-before.txt'
    owner: root
    group: root
    mode: '0640'
    content: 'rc: {{ uip_rhsm_status.rc }}

      stdout:

      {{ uip_rhsm_status.stdout | default('''') }}

      stderr:

      {{ uip_rhsm_status.stderr | default('''') }}

      '
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Disable source RHSM repositories
  ansible.builtin.command: subscription-manager repos --disable={{ item }}
  loop: '{{ uip_repo_def.repos_disable | default([]) }}'
  register: uip_sat_disable
  changed_when: '''is disabled'' in (uip_sat_disable.stdout | default('''')) or ''disabled'' in (uip_sat_disable.stdout |
    default(''''))'
  failed_when: false
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Enable target RHSM repositories
  ansible.builtin.command: subscription-manager repos --enable={{ item }}
  loop: '{{ uip_repo_def.repos_enable }}'
  register: uip_sat_enable
  changed_when: '''is enabled'' in (uip_sat_enable.stdout | default('''')) or ''enabled'' in (uip_sat_enable.stdout | default(''''))'
  failed_when: uip_sat_enable.rc != 0
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Refresh yum or dnf metadata after Satellite repo changes
  ansible.builtin.command: '{{ ''dnf makecache'' if uip_pkg_mgr == ''dnf'' else ''yum makecache'' }}'
  register: uip_sat_makecache
  changed_when: false
  failed_when: uip_sat_makecache.rc != 0
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Capture enabled RHSM repositories
  ansible.builtin.command: subscription-manager repos --list-enabled
  register: uip_sat_enabled_repos
  changed_when: false
  failed_when: uip_sat_enabled_repos.rc != 0
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Assert target Satellite repositories are enabled
  ansible.builtin.assert:
    that:
      - item in uip_sat_enabled_repos.stdout
    fail_msg: Expected Satellite repository {{ item }} is not enabled.
  loop: '{{ uip_repo_def.repos_enable }}'
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Save enabled Satellite repositories report
  ansible.builtin.copy:
    dest: '{{ uip_report_dir }}/satellite-enabled-repos.txt'
    owner: root
    group: root
    mode: '0640'
    content: '{{ uip_sat_enabled_repos.stdout }}'
  tags:
    - uip_repos_satellite
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade


- name: Apply explicit repository binding intent
  ansible.builtin.debug:
    msg:
      - "repo_manager={{ uip_repo_mgr }}"
      - "source_activation_key={{ uip_repo_src_binding | default('') }}"
      - "target_activation_key={{ uip_repo_dst_binding | default('') }}"
      - "source_environment={{ uip_repo_src_environment | default('') }}"
      - "target_environment={{ uip_repo_dst_environment | default('') }}"
      - "source_content_view={{ uip_repo_src_cv | default('') }}"
      - "target_content_view={{ uip_repo_dst_cv | default('') }}"
  when:
    - (uip_repo_dst_binding | default('') | length > 0)
      or (uip_repo_dst_environment | default('') | length > 0)
      or (uip_repo_dst_cv | default('') | length > 0)
  tags:
    - uip_discovery
    - uip_preupgrade
    - uip_postcheck
    - uip_postupgrade
