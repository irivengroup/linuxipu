---
- name: Configure native APT target repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/uip-{{ uip_dst_name }}.list
    mode: '0644'
    content: 'deb {{ uip_repo_def.dst_url }} {{ uip_repo_def.dst_suite }} {{ uip_repo_def.components | join('' '') }}

      deb {{ uip_repo_def.dst_url }} {{ uip_repo_def.dst_suite }}-updates {{ uip_repo_def.components | join('' '') }}

      '
  when: uip_pkg_mgr == "apt"
  tags:
    - uip_repos_native
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade
- name: Native repository manager selected for RPM/SUSE
  ansible.builtin.debug:
    msg: Using native managed repositories for {{ uip_path_key }}
  when: uip_pkg_mgr in ['yum', 'dnf', 'zypper']
  tags:
    - uip_repos_native
    - uip_preupgrade
    - uip_discovery
    - uip_postcheck
    - uip_postupgrade


- name: Apply explicit repository binding intent
  ansible.builtin.debug:
    msg:
      - "repo_manager={{ uip_repo_mgr }}"
      - "source_activation_key={{ uip_repo_src_binding | default('') }}"
      - "target_activation_key={{ uip_repo_dst_binding | default('') }}"
      - "source_environment={{ uip_repo_src_environment | default('') }}"
      - "target_environment={{ uip_repo_dst_environment | default('') }}"
      - "source_content_view={{ uip_repo_src_cv | default('') }}"
      - "target_content_view={{ uip_repo_dst_cv | default('') }}"
  when:
    - (uip_repo_dst_binding | default('') | length > 0)
      or (uip_repo_dst_environment | default('') | length > 0)
      or (uip_repo_dst_cv | default('') | length > 0)
  tags:
    - uip_discovery
    - uip_preupgrade
    - uip_postcheck
    - uip_postupgrade
