---
- name: Resolve explicit repository bindings
  ansible.builtin.set_fact:
    uip_repo_src_binding: >-
      {{
        uip_repo_src_ak
        if uip_repo_src_ak | length > 0
        else uip_repo_manager_bindings.get(uip_repo_mgr, {}).get('src_ak', '')
      }}
    uip_repo_dst_binding: >-
      {{
        uip_repo_dst_ak
        if uip_repo_dst_ak | length > 0
        else uip_repo_manager_bindings.get(uip_repo_mgr, {}).get('dst_ak', '')
      }}
    uip_repo_src_environment: >-
      {{
        uip_repo_src_env
        if uip_repo_src_env | length > 0
        else uip_repo_manager_bindings.get(uip_repo_mgr, {}).get('src_env', '')
      }}
    uip_repo_dst_environment: >-
      {{
        uip_repo_dst_env
        if uip_repo_dst_env | length > 0
        else uip_repo_manager_bindings.get(uip_repo_mgr, {}).get('dst_env', '')
      }}
    uip_repo_src_cv: >-
      {{
        uip_repo_src_content_view
        if uip_repo_src_content_view | length > 0
        else uip_repo_manager_bindings.get(uip_repo_mgr, {}).get('src_content_view', '')
      }}
    uip_repo_dst_cv: >-
      {{
        uip_repo_dst_content_view
        if uip_repo_dst_content_view | length > 0
        else uip_repo_manager_bindings.get(uip_repo_mgr, {}).get('dst_content_view', '')
      }}
  tags:
    - uip_discovery
    - uip_preupgrade
    - uip_postcheck
    - uip_postupgrade

- name: Validate explicit repository binding when strict mode is enabled
  ansible.builtin.assert:
    that:
      - not (uip_repo_explicit_binding_required | bool)
        or (uip_repo_dst_binding | length > 0)
        or (uip_repo_dst_environment | length > 0)
        or (uip_repo_dst_cv | length > 0)
    fail_msg: >-
      Explicit repository binding is required for {{ uip_repo_mgr }}, but no
      target activation key, environment or content view was provided.
  tags:
    - uip_discovery
    - uip_preupgrade
    - uip_postcheck
    - uip_postupgrade

- name: Persist repository binding state for rollback
  ansible.builtin.copy:
    dest: "{{ uip_repo_binding_state_file }}"
    owner: root
    group: root
    mode: "0640"
    content: |
      repo_manager: "{{ uip_repo_mgr }}"
      source:
        activation_key: "{{ uip_repo_src_binding }}"
        environment: "{{ uip_repo_src_environment }}"
        content_view: "{{ uip_repo_src_cv }}"
      target:
        activation_key: "{{ uip_repo_dst_binding }}"
        environment: "{{ uip_repo_dst_environment }}"
        content_view: "{{ uip_repo_dst_cv }}"
      src_ver: "{{ uip_src_ver | default('unknown') }}"
      dst_ver: "{{ uip_dst_ver | default('unknown') }}"
      recorded_at: "{{ ansible_date_time.iso8601 }}"
  tags:
    - uip_discovery
    - uip_preupgrade

- name: Persist repository binding report
  ansible.builtin.copy:
    dest: "{{ uip_repo_binding_report_file }}"
    owner: root
    group: root
    mode: "0640"
    content: |
      repo_manager: "{{ uip_repo_mgr }}"
      explicit_binding_required: "{{ uip_repo_explicit_binding_required }}"
      source_activation_key: "{{ uip_repo_src_binding }}"
      target_activation_key: "{{ uip_repo_dst_binding }}"
      source_environment: "{{ uip_repo_src_environment }}"
      target_environment: "{{ uip_repo_dst_environment }}"
      source_content_view: "{{ uip_repo_src_cv }}"
      target_content_view: "{{ uip_repo_dst_cv }}"
  tags:
    - uip_discovery
    - uip_preupgrade
    - uip_postcheck
    - uip_postupgrade
