---
extends: default

rules:
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values:
      - "true"
      - "false"
      - "yes"
      - "no"
    check-keys: false
  comments:
    min-spaces-from-content: 1
  document-start:
    present: true

ignore: |
  .venv/
  .git/
  .github/
