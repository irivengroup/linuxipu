---
name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Ansible and YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible collections
        run: |
          set -euo pipefail
          if [ -f requirements.yml ]; then
            for attempt in 1 2 3 4 5; do
              echo "Installing Ansible collections, attempt ${attempt}/5"
              if ansible-galaxy collection install -r requirements.yml --force; then
                exit 0
              fi
              sleep $((attempt * 20))
            done
            ansible-galaxy collection install -r requirements.yml --force -vvv
          fi

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint playbooks/*.yml roles

  syntax:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    needs:
      - lint

    strategy:
      fail-fast: false
      matrix:
        playbook:
          - playbooks/uip.yml
          - playbooks/uip_rollback.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible collections
        run: |
          set -euo pipefail
          if [ -f requirements.yml ]; then
            for attempt in 1 2 3 4 5; do
              echo "Installing Ansible collections, attempt ${attempt}/5"
              if ansible-galaxy collection install -r requirements.yml --force; then
                exit 0
              fi
              sleep $((attempt * 20))
            done
            ansible-galaxy collection install -r requirements.yml --force -vvv
          fi

      - name: Syntax check
        run: ansible-playbook --syntax-check "${{ matrix.playbook }}"

  structure:
    name: Framework structure checks
    runs-on: ubuntu-latest
    needs:
      - lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate mandatory roles
        run: |
          set -euo pipefail
          mandatory_roles=(
            uip_common
            uip_agents
            uip_lock
            uip_discovery
            uip_repos
            uip_snapshot
            uip_precheck
            uip_update
            uip_remediate
            uip_upgrade
            uip_reboot
            uip_postcheck
            uip_report
            uip_rollback
          )
          for role in "${mandatory_roles[@]}"; do
            test -d "roles/${role}" || {
              echo "Missing role: ${role}"
              exit 1
            }
          done


      - name: Validate transverse tags
        run: |
          set -euo pipefail
          grep -R "uip_preupgrade" playbooks roles
          grep -R "uip_postupgrade" playbooks roles

      - name: Validate removed standalone nested-role tags
        run: |
          set -euo pipefail
          forbidden='uip_lock|uip_repos|uip_reboot|uip_update'
          if grep -R -E "^[[:space:]]+- (${forbidden})$" playbooks roles; then
            echo "Forbidden standalone nested-role tag found."
            exit 1
          fi

      - name: Validate no group_vars directory
        run: |
          set -euo pipefail
          if [ -d group_vars ]; then
            echo "group_vars is forbidden. Use roles/uip_common instead."
            exit 1
          fi

      - name: Validate mappings are centralized
        run: |
          set -euo pipefail
          test -f roles/uip_common/vars/main.yml
          test -f roles/uip_common/vars/vars.d/upgradePaths.yml
          test -f roles/uip_common/vars/vars.d/repoMapping.yml
          test -f roles/uip_common/vars/vars.d/repoDetection.yml
          grep -q "^uip_paths:" roles/uip_common/vars/vars.d/upgradePaths.yml
          grep -q "^uip_repo_map:" roles/uip_common/vars/vars.d/repoMapping.yml
          grep -q "^uip_repo_detect_rules:"             roles/uip_common/vars/vars.d/repoDetection.yml

      - name: Validate VM provider credentials template
        run: |
          set -euo pipefail
          test -f roles/uip_common/vars/vars.d/vmproviders.yml
          grep -q "^uip_vmproviders:"             roles/uip_common/vars/vars.d/vmproviders.yml

  package:
    name: Package artifact
    runs-on: ubuntu-latest
    needs:
      - syntax
      - structure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build archive
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cache' \
            --exclude='.venv' \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            -czf "${RUNNER_TEMP}/linux-uip.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-uip
          path: >-
            ${{ runner.temp }}/linux-uip.tar.gz
          if-no-files-found: error
